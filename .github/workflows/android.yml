name: Build Android APK

on:
  push:
    branches: ["main"]
    paths:
      - 'android/**'
      - 'css/**'
      - 'js/**'
      - 'pages/**'
      - '*.html'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: preppath-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Delete old release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const latestRelease = releases.data.find(r => r.tag_name === 'latest-build');
            if (latestRelease) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: latestRelease.id
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest-build'
              });
            }

      - name: Create/Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: latest-build
          name: Latest Build
          body: |
            📱 **StudyPlanner Debug APK - Latest Build**
            
            This is the most recent build. Download and use this APK.
            
            **Build Info:**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Built at: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
