name: Daily Telegram Study Plan

on:
  schedule:
    # Runs every 15 minutes at OFF-PEAK minutes (avoids :00/:30, which GitHub
    # drops most often due to peak load). The sender only actually sends once
    # per day, on the first run at/after the admin-configured time stored in
    # Firestore config/telegram.sendTime (IST, default 06:00). Other runs read
    # one config doc and exit immediately.
    # NB: GitHub scheduled runs can still be delayed; reliability is best on a
    # public repo (free, unlimited Actions minutes).
    - cron: '8,23,38,53 * * * *'
  workflow_dispatch: {}   # manual runs from the Actions tab (force send, bypasses the time gate)

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Validate secrets
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN secret is not set!"
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret is not set!"
            exit 1
          fi
          echo "✅ Both secrets present"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Send daily plans
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-telegram.js
