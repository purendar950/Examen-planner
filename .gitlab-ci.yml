# Publishes the project's HTML files using GitLab Pages.
# The site is served from the `public/` directory.
pages:
  stage: deploy
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
    - mv dist public
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
