<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamZen — Admin Panel</title>
<meta name="robots" content="noindex">
<style>
  :root { --accent:#00C896; --accent-dark:#00A47C; --bg:#F6F8FA; --card:#fff; --border:#E3E8EF; --text:#1A2233; --muted:#64748B; --red:#EF4444; --amber:#F59E0B; --blue:#3B82F6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 1.25rem; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .logo { font-weight:800; font-size:1.02rem; } .logo span { color:var(--accent); }
  .btn { border:none; border-radius:8px; padding:8px 16px; font-weight:600; cursor:pointer; font-family:inherit; font-size:0.83rem; }
  .btn-green { background:var(--accent); color:#fff; } .btn-green:hover { background:var(--accent-dark); }
  .btn-red { background:rgba(239,68,68,0.1); color:var(--red); }
  .btn-gray { background:#EEF2F6; color:var(--text); }
  .btn-blue { background:rgba(59,130,246,0.1); color:var(--blue); }
  .tabs { display:flex; background:#fff; border-bottom:1px solid var(--border); padding:0 0.75rem; overflow-x:auto; position:sticky; top:58px; z-index:40; }
  .tab { padding:0.8rem 0.95rem; font-size:0.83rem; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tab.active { color:var(--accent-dark); border-bottom-color:var(--accent); }
  .wrap { max-width:1100px; margin:0 auto; padding:1.25rem; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1rem 1.25rem; margin-bottom:0.85rem; }
  .muted { color:var(--muted); font-size:0.78rem; }
  .flag { display:inline-block; background:rgba(239,68,68,0.1); color:var(--red); border-radius:5px; padding:2px 8px; font-size:0.68rem; font-weight:700; margin:2px 4px 2px 0; }
  .badge { display:inline-block; border-radius:5px; padding:2px 8px; font-size:0.7rem; font-weight:700; }
  .badge-green { background:rgba(0,200,150,0.12); color:var(--accent-dark); }
  .badge-amber { background:rgba(245,158,11,0.12); color:var(--amber); }
  .badge-red { background:rgba(239,68,68,0.1); color:var(--red); }
  .badge-blue { background:rgba(59,130,246,0.1); color:var(--blue); }
  input, select { padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.85rem; outline:none; background:#fff; color:var(--text); }
  input:focus, select:focus { border-color:var(--accent); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .stat-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:10px; margin-bottom:1.1rem; }
  .stat { background:#fff; border:1px solid var(--border); border-radius:10px; padding:0.8rem; }
  .stat b { font-size:1.3rem; } .stat div { font-size:0.7rem; color:var(--muted); }
  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:1rem; z-index:100; }
  .login-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:2rem; max-width:380px; width:100%; box-shadow:0 10px 30px rgba(15,23,42,0.08); }
  .login-card h2 { font-size:1.1rem; margin-bottom:1.25rem; }
  .login-card input { width:100%; margin-bottom:10px; }
  .err { color:var(--red); font-size:0.8rem; margin:6px 0; display:none; }
  #panel { display:none; }
  h3 { font-size:0.95rem; margin-bottom:0.6rem; }
  .empty { text-align:center; padding:2.5rem 1rem; color:var(--muted); font-size:0.85rem; }
  @media (max-width:600px) { .wrap { padding:0.75rem; } .card { padding:0.85rem; } }
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>🔐 ExamZen Admin</h2>
    <input type="email" id="adm-email" placeholder="Admin email">
    <input type="password" id="adm-pass" placeholder="Password">
    <div class="err" id="adm-err"></div>
    <button class="btn btn-green" style="width:100%;padding:11px;" onclick="adminLoginEmail()">Sign In</button>
    <button class="btn btn-gray" style="width:100%;padding:11px;margin-top:8px;" onclick="adminLoginGoogle()">Continue with Google</button>
    <p class="muted" style="margin-top:12px;text-align:center;">Sirf admin account se access milega.</p>
  </div>
</div>

<div id="panel">
  <div class="topbar">
    <div class="logo">🧘 Exam<span>Zen</span> · Admin</div>
    <div class="row">
      <span class="muted" id="admin-email"></span>
      <button class="btn btn-gray" onclick="loadAll().then(render)">↻ Refresh</button>
      <button class="btn btn-red" onclick="firebase.auth().signOut().then(()=>location.reload())">Logout</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-t="pending" onclick="setTab('pending')">⏳ Pending <span id="cnt-pending"></span></div>
    <div class="tab" data-t="users" onclick="setTab('users')">👥 Users</div>
    <div class="tab" data-t="plans" onclick="setTab('plans')">💰 Plans</div>
    <div class="tab" data-t="payments" onclick="setTab('payments')">🧾 Payments</div>
    <div class="tab" data-t="referrals" onclick="setTab('referrals')">🔗 Referrals</div>
    <div class="tab" data-t="payouts" onclick="setTab('payouts')">💸 Payouts</div>
    <div class="tab" data-t="requests" onclick="setTab('requests')">&#x1f4a1; Requests <span id="cnt-requests"></span></div>
    <div class="tab" data-t="settings" onclick="setTab('settings')">&#x2699; Settings</div>
  </div>
  <div class="wrap">
    <div class="stat-row" id="stats"></div>
    <div id="content"></div>
  </div>
</div>

<script>
/* ══ CONFIG — admin role stored in Firestore admins/{uid} ══ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDTBc3RAED-HuFZv7xyT2X0WFBRIXr9png",
  authDomain:        "syncstudy-3d734.firebaseapp.com",
  projectId:         "syncstudy-3d734",
  storageBucket:     "syncstudy-3d734.firebasestorage.app",
  messagingSenderId: "729906734037",
  appId:             "1:729906734037:web:d75d73d101bfbb52c3535c"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore(), auth = firebase.auth();

let USERS = [], PLANS = [], PAYMENTS = [], REQUESTS = [], TAB = 'pending', PAY_FILTER = 'all';
let CONFIG = {}, SETTINGS = { requireApproval: false };
let DUP = { mobile:{}, fp:{}, ip:{} };

function showToast(msg) { let t=document.getElementById('adm-toast'); if(!t){t=document.createElement('div');t.id='adm-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:10px;font-size:0.85rem;z-index:999;';document.body.appendChild(t);} t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { try { const d = ts && ts.toDate ? ts.toDate() : (ts ? new Date(ts) : null); return d ? d.toLocaleString('en-IN', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'; } catch(e){ return '—'; } }

/* ══ AUTH ══ */
function admErr(m) { const e = document.getElementById('adm-err'); e.textContent = m; e.style.display = 'block'; }
async function adminLoginEmail() {
  const em = document.getElementById('adm-email').value.trim(), pw = document.getElementById('adm-pass').value;
  if (!em || !pw) { admErr('Email aur password dono bharo.'); return; }
  try { await auth.signInWithEmailAndPassword(em, pw); } catch(e) { admErr('Login failed: ' + (e.code || e.message)); }
}
async function adminLoginGoogle() {
  try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) { admErr('Google login failed: ' + (e.code || e.message)); }
}
auth.onAuthStateChanged(async (u) => {
  if (!u) { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('panel').style.display = 'none'; return; }
  try {
    const adminDoc = await db.collection('admins').doc(u.uid).get();
    if (!adminDoc.exists) {
      await auth.signOut();
      admErr('Access denied. Firestore mein admins/' + u.uid + ' doc banao.');
      return;
    }
  } catch(e) { await auth.signOut(); admErr('Role check failed: ' + e.message); return; }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  document.getElementById('admin-email').textContent = u.email;
  await loadAll();
  render();
});

/* ══ DATA ══ */
async function loadAll() {
  try {
    const us = await db.collection('users').get();
    USERS = us.docs.map(d => ({ id: d.id, p: (d.data().profile || {}) }));
  } catch(e) { alert('Users load failed — Firestore rules update kiye? ' + e.message); USERS = []; }
  try { const ps = await db.collection('plans').get(); PLANS = ps.docs.map(d => ({ id: d.id, ...d.data() })); } catch(e) { PLANS = []; }
  try {
    const pay = await db.collection('payments').get();
    PAYMENTS = pay.docs.map(d => ({ id: d.id, ...d.data() }));
    PAYMENTS.sort((a,b) => ((b.createdAt&&b.createdAt.seconds)||0) - ((a.createdAt&&a.createdAt.seconds)||0));
  } catch(e) { PAYMENTS = []; }
  try { const cf = await db.collection('config').doc('payment').get(); CONFIG = cf.exists ? cf.data() : {}; } catch(e) { CONFIG = {}; }
  try { const ff = await db.collection('config').doc('free').get(); CONFIG.free = ff.exists ? ff.data() : { mocks:5, mediaSaves:2, notes:10 }; } catch(e) { CONFIG.free = { mocks:5, mediaSaves:2, notes:10 }; }
  try { const ff = await db.collection('config').doc('free').get(); CONFIG.free = ff.exists ? ff.data() : { mocks:5, mediaSaves:2, notes:10 }; } catch(e) { CONFIG.free = { mocks:5, mediaSaves:2, notes:10 }; }
  DUP = { mobile:{}, fp:{}, ip:{} };
  USERS.forEach(u => {
    if (u.p.mobile) DUP.mobile[u.p.mobile] = (DUP.mobile[u.p.mobile] || 0) + 1;
    if (u.p.fp) DUP.fp[u.p.fp] = (DUP.fp[u.p.fp] || 0) + 1;
    if (u.p.ip) DUP.ip[u.p.ip] = (DUP.ip[u.p.ip] || 0) + 1;
  });
  await syncReferralStats();
  try { const rq = await db.collection('requests').get(); REQUESTS = rq.docs.map(d => ({ id: d.id, ...d.data() })); REQUESTS.sort((a,b) => ((b.createdAt&&b.createdAt.seconds)||0) - ((a.createdAt&&a.createdAt.seconds)||0)); } catch(e) { REQUESTS = []; }
  try { const sv = await db.collection('config').doc('settings').get(); SETTINGS = sv.exists ? sv.data() : { requireApproval: false }; } catch(e) { SETTINGS = { requireApproval: false }; }
}

/* Write referral counters onto each referrer's profile so the app can show
   their Share & Earn progress (normal users cannot query other users) */
async function syncReferralStats() {
  const refMap = {};
  USERS.forEach(u => { if (u.p.referredBy) { (refMap[u.p.referredBy] = refMap[u.p.referredBy] || []).push(u); } });
  for (const refUid of Object.keys(refMap)) {
    const referrer = USERS.find(x => x.id === refUid); if (!referrer) continue;
    const total = refMap[refUid].length;
    const paid = refMap[refUid].filter(x => x.p.plan && x.p.plan !== 'free').length;
    if (referrer.p.refTotalCount !== total || referrer.p.refPaidCount !== paid) {
      try {
        await db.collection('users').doc(refUid).update({ 'profile.refTotalCount': total, 'profile.refPaidCount': paid });
        referrer.p.refTotalCount = total; referrer.p.refPaidCount = paid;
      } catch(e) {}
    }
  }
}
function flagsFor(u) {
  const f = [];
  if (u.p.mobile && DUP.mobile[u.p.mobile] > 1) f.push('Duplicate mobile');
  if (u.p.fp && DUP.fp[u.p.fp] > 1) f.push('Same device');
  if (u.p.ip && DUP.ip[u.p.ip] > 1) f.push('Same IP');
  if (u.p.referredBy && u.p.referredBy === u.id) f.push('Self-referral');
  return f;
}
function paidReferralsOf(uid) { return USERS.filter(x => x.p.referredBy === uid && x.p.plan && x.p.plan !== 'free'); }

/* ══ RENDER ══ */
function setTab(t) {
  TAB = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.t === t));
  render();
}
function render() {
  const pending = USERS.filter(u => u.p.status === 'pending').length;
  const approved = USERS.filter(u => u.p.status === 'approved' || !u.p.status).length;
  const paid = USERS.filter(u => u.p.plan && u.p.plan !== 'free').length;
  const payPending = PAYMENTS.filter(p => p.status === 'pending').length;
  document.getElementById('cnt-pending').textContent = pending ? '(' + pending + ')' : '';
  const newReqs = (REQUESTS || []).filter(r => r.status === 'new').length;
  const cntReqEl = document.getElementById('cnt-requests');
  if (cntReqEl) cntReqEl.textContent = newReqs ? '(' + newReqs + ')' : '';
  document.getElementById('stats').innerHTML =
    '<div class="stat"><b>' + USERS.length + '</b><div>Total users</div></div>' +
    '<div class="stat"><b style="color:var(--amber)">' + pending + '</b><div>Pending requests</div></div>' +
    '<div class="stat"><b style="color:var(--accent-dark)">' + approved + '</b><div>Active users</div></div>' +
    '<div class="stat"><b style="color:var(--blue)">' + paid + '</b><div>Paid plans</div></div>' +
    '<div class="stat"><b style="color:var(--red)">' + payPending + '</b><div>Payments to verify</div></div>';
  const c = document.getElementById('content');
  if (TAB === 'pending') c.innerHTML = renderPending();
  else if (TAB === 'users') c.innerHTML = renderUsers();
  else if (TAB === 'plans') c.innerHTML = renderPlans();
  else if (TAB === 'payments') c.innerHTML = renderPayments();
  else if (TAB === 'referrals') c.innerHTML = renderReferrals();
  else if (TAB === 'payouts') c.innerHTML = renderPayouts();
  else if (TAB === 'requests') c.innerHTML = renderRequests();
  else if (TAB === 'settings') c.innerHTML = renderSettings();
}

function userMeta(u) {
  return '<div class="muted" style="margin-top:3px;">📱 ' + esc(u.p.mobile || '—') + ' · 🎯 ' + esc((u.p.examTarget || '—').toUpperCase()) + ' · 🕒 ' + fmtDate(u.p.requestedAt || u.p.createdAt) + (u.p.referredBy ? ' · 🔗 ref: ' + esc(u.p.referredBy.substring(0, 10)) + '…' : '') + '</div>' +
    '<div class="muted">fp: ' + esc(u.p.fp || '—') + ' · ip: ' + esc(u.p.ip || '—') + '</div>' +
    flagsFor(u).map(f => '<span class="flag">⚠ ' + f + '</span>').join('');
}

function renderPending() {
  const list = USERS.filter(u => u.p.status === 'pending');
  if (!list.length) return '<div class="empty">&#127881; Koi pending request nahi hai.</div>';
  return list.map(u => {
    const dupBadge = u.p.deviceDuplicate
      ? '<span class="badge badge-amber" title="Same device fingerprint as an existing account">&#128273; Same Device</span>'
      : '<span class="badge badge-green">New Device</span>';
    const examBadge = u.p.examTarget
      ? '<span class="badge badge-blue">' + esc(u.p.examTarget) + '</span>'
      : '';
    return '<div class="card"><div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:10px;">' +
    '<div style="flex:1;min-width:220px;">' +
    '<strong>' + esc(u.p.name || '?') + '</strong> ' + dupBadge + ' ' + examBadge +
    '<div class="muted" style="margin-top:3px;font-size:0.8rem;">' + esc(u.p.email || '') + ' &middot; ' + esc(u.p.mobile || '') + ' &middot; ' + fmtDate(u.p.requestedAt) + '</div>' +
    userMeta(u) + '</div>' +
    '<div class="row">' +
    '<button class="btn btn-green" onclick="approveUser(\'' + u.id + '\')">&#10003; Approve</button>' +
    '<button class="btn btn-red" onclick="rejectUser(\'' + u.id + '\')">&#10005; Reject</button>' +
    '</div></div></div>';
  }).join('');
}

function renderUsers() {
  const list = USERS.filter(u => u.p.status !== 'pending');
  if (!list.length) return '<div class="empty">Koi user nahi.</div>';
  const planOpts = (sel) => '<option value="free">Free</option>' + PLANS.map(p => '<option value="' + p.id + '"' + (sel === p.name ? ' selected' : '') + '>' + esc(p.name) + ' (₹' + (p.price || 0) + ')</option>').join('');
  return list.map(u => {
    const suspended = u.p.status === 'rejected';
    const planBadge = (u.p.plan && u.p.plan !== 'free') ? '<span class="badge badge-blue">' + esc(u.p.plan) + (u.p.planExpiry ? ' till ' + esc(u.p.planExpiry) : '') + '</span>' : '<span class="badge badge-green">Free</span>';
    return '<div class="card"><div class="row" style="justify-content:space-between;">' +
      '<div style="flex:1;min-width:220px;"><strong>' + esc(u.p.name || '?') + '</strong> <span class="muted">' + esc(u.p.email || '') + '</span> ' + planBadge + (suspended ? ' <span class="badge badge-red">Suspended</span>' : '') + userMeta(u) + '</div>' +
      '<div class="row">' +
      '<select id="plan-' + u.id + '">' + planOpts(u.p.plan) + '</select>' +
      '<button class="btn btn-blue" onclick="setPlan(\'' + u.id + '\')">Set Plan</button>' +
      (suspended
        ? '<button class="btn btn-green" onclick="approveUser(\'' + u.id + '\')">✓ Re-activate</button>'
        : '<button class="btn btn-red" onclick="suspendUser(\'' + u.id + '\')">⏸ Suspend</button>') +
      '</div></div></div>';
  }).join('');
}

function renderPlans() {
  let h = '<div class="card"><h3>⚙ Payment Settings (UPI)</h3><div class="row">' +
    '<input id="cfg-upi" placeholder="UPI ID (e.g. name@okhdfcbank)" value="' + esc(CONFIG.upiId || '') + '" style="flex:1;min-width:200px;">' +
    '<input id="cfg-payee" placeholder="Payee name" value="' + esc(CONFIG.payeeName || '') + '" style="width:160px;">' +
    '<button class="btn btn-green" onclick="saveUpiConfig()">Save UPI</button></div>' +
    '<div class="muted" style="margin-top:6px;">Ye UPI ID users ko app ke Upgrade modal mein dikhegi. Pehle ise zaroor set karo.</div></div>';
  const fr = CONFIG.free || { mocks:5, mediaSaves:2, notes:10 };
  h += '<div class="card"><h3>🆓 Free Plan Limits</h3>' +
    '<div class="row" style="gap:12px;flex-wrap:wrap;">' +
    '<label style="display:flex;flex-direction:column;gap:4px;font-size:.82rem;color:var(--muted);">Mock saves<input id="free-mocks" type="number" min="0" value="' + (fr.mocks||5) + '" style="width:80px;"></label>' +
    '<label style="display:flex;flex-direction:column;gap:4px;font-size:.82rem;color:var(--muted);">Playlists / links<input id="free-media" type="number" min="0" value="' + (fr.mediaSaves||2) + '" style="width:80px;"></label>' +
    '<label style="display:flex;flex-direction:column;gap:4px;font-size:.82rem;color:var(--muted);">Video notes<input id="free-notes" type="number" min="0" value="' + (fr.notes||10) + '" style="width:80px;"></label>' +
    '<button class="btn btn-green" style="align-self:flex-end;" onclick="saveFreeLimits()">Save Limits</button>' +
    '</div><div class="muted" style="margin-top:6px;">App automatically loads these from Firestore on next refresh.</div></div>';
  h += '<div class="card"><h3>➕ Add / Edit Plan</h3><div class="row">' +
    '<input id="pl-name" placeholder="Plan name (e.g. Pro 1 Month)" style="flex:1;min-width:160px;">' +
    '<input id="pl-price" type="number" placeholder="Price ₹" style="width:100px;">' +
    '<input id="pl-days" type="number" placeholder="Days" style="width:90px;">' +
    '<input id="pl-feat" placeholder="Features (comma separated)" style="flex:2;min-width:200px;">' +
    '<button class="btn btn-green" onclick="savePlan()">Save Plan</button></div>' +
    '<input type="hidden" id="pl-id"></div>';
  if (!PLANS.length) h += '<div class="empty">Abhi koi plan nahi banaya. Upar se pehla plan add karo (e.g. Pro 1 Month · ₹99 · 30 days).</div>';
  h += PLANS.map(p =>
    '<div class="card row" style="justify-content:space-between;">' +
    '<div><strong>' + esc(p.name) + '</strong> · ₹' + (p.price || 0) + ' · ' + (p.days || 0) + ' days<div class="muted">' + esc(p.features || '') + '</div></div>' +
    '<div class="row"><button class="btn btn-gray" onclick="editPlan(\'' + p.id + '\')">✏ Edit</button>' +
    '<button class="btn btn-red" onclick="deletePlan(\'' + p.id + '\')">🗑</button></div></div>'
  ).join('');
  return h;
}

function renderPayments() {
  const counts = { all: PAYMENTS.length, pending: 0, verified: 0, declined: 0 };
  PAYMENTS.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
  let h = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">' +
    ['all','pending','verified','declined'].map(f =>
      '<button class="btn ' + (PAY_FILTER===f ? 'btn-green' : 'btn-gray') + '" onclick="PAY_FILTER=\'' + f + '\';render();">'
      + (f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)) + ' (' + counts[f] + ')</button>'
    ).join('') + '</div>';
  const list = PAY_FILTER === 'all' ? PAYMENTS : PAYMENTS.filter(p => p.status === PAY_FILTER);
  if (!list.length) return h + '<div class="empty">Is filter mein koi payment nahi.</div>';
  h += list.map(p => {
    const st = p.status === 'verified' ? '<span class="badge badge-green">Verified</span>' : p.status === 'declined' ? '<span class="badge badge-red">Declined</span>' : '<span class="badge badge-amber">Pending</span>';
    const ss = p.screenshotUrl ? '<a href="' + esc(p.screenshotUrl) + '" target="_blank" style="font-size:0.78rem;color:var(--accent);margin-left:8px;">View Screenshot</a>' : '';
    return '<div class="card" style="margin-bottom:10px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">' +
      '<div style="flex:1;min-width:220px;"><strong>' + esc(p.email || p.uid) + '</strong> ' + st + ss +
      '<div class="muted" style="margin-top:4px;">Plan: ' + esc(p.planName || p.planId || '?') + ' &middot; Rs.' + (p.amount || 0) + ' &middot; Txn: <strong>' + esc(p.txnId || '-') + '</strong> &middot; ' + fmtDate(p.createdAt) + '</div>' +
      (p.screenshotUrl ? '<div style="margin-top:8px;"><img src="' + esc(p.screenshotUrl) + '" style="max-width:220px;max-height:130px;border-radius:8px;border:1px solid var(--border);cursor:pointer;" onclick="window.open(this.src,\'_blank\')"></div>' : '') +
      '</div>' +
      (p.status === 'pending'
        ? '<div class="row" style="flex-shrink:0;align-items:flex-start;"><button class="btn btn-green" onclick="verifyPayment(\'' + p.id + '\')">Verify & Activate</button>' +
          '<button class="btn btn-red" onclick="declinePayment(\'' + p.id + '\')">Decline</button></div>'
        : '') +
      '</div></div>';
  }).join('');
  return h;
}

function renderReferrals() {
  const refMap = {};
  USERS.forEach(u => { if (u.p.referredBy) { (refMap[u.p.referredBy] = refMap[u.p.referredBy] || []).push(u); } });
  const keys = Object.keys(refMap);
  if (!keys.length) return '<div class="empty">Abhi koi referral nahi hua.</div>';
  return keys.map(refUid => {
    const referrer = USERS.find(x => x.id === refUid);
    const referred = refMap[refUid];
    const paidCount = referred.filter(x => x.p.plan && x.p.plan !== 'free').length;
    return '<div class="card">' +
      '<div><strong>' + esc(referrer ? (referrer.p.name + ' (' + referrer.p.email + ')') : refUid) + '</strong> ' +
      '<span class="badge badge-blue">' + referred.length + ' referred</span> ' +
      '<span class="badge badge-green">' + paidCount + ' paid · ₹' + (paidCount * 10) + ' earned</span></div>' +
      referred.map(r => '<div class="muted" style="margin-top:6px;padding-left:10px;border-left:2px solid var(--border);">' + esc(r.p.name || '?') + ' · ' + esc(r.p.email || '') + ' · ' + (r.p.plan && r.p.plan !== 'free' ? '<span class="badge badge-green">' + esc(r.p.plan) + '</span>' : 'Free') + ' ' + flagsFor(r).map(f => '<span class="flag">⚠ ' + f + '</span>').join('') + '</div>').join('') +
      '</div>';
  }).join('');
}

function renderPayouts() {
  const refMap = {};
  USERS.forEach(u => { if (u.p.referredBy) { (refMap[u.p.referredBy] = refMap[u.p.referredBy] || []).push(u); } });
  const rows = Object.keys(refMap).map(refUid => {
    const referrer = USERS.find(x => x.id === refUid);
    const paidCount = refMap[refUid].filter(x => x.p.plan && x.p.plan !== 'free').length;
    const earned = paidCount * 10;
    const alreadyPaid = (referrer && referrer.p.payoutPaidAmount) || 0;
    const due = earned - alreadyPaid;
    return { refUid, referrer, paidCount, earned, alreadyPaid, due, eligible: paidCount >= 20 };
  }).filter(r => r.paidCount > 0);
  if (!rows.length) return '<div class="empty">Abhi koi paid referral nahi. Payout tab unlock hota hai jab kisi referrer ke 20 paid referrals complete hon.</div>';
  return rows.map(r =>
    '<div class="card row" style="justify-content:space-between;">' +
    '<div style="flex:1;min-width:220px;"><strong>' + esc(r.referrer ? r.referrer.p.name + ' (' + r.referrer.p.email + ')' : r.refUid) + '</strong>' +
    '<div class="muted">' + r.paidCount + '/20 paid referrals · Earned ₹' + r.earned + ' · Already paid ₹' + r.alreadyPaid + ' · <strong>Due ₹' + r.due + '</strong></div>' +
    (r.eligible ? '<span class="badge badge-green">✓ Payout unlocked</span>' : '<span class="badge badge-amber">Locked — needs 20 paid referrals</span>') + '</div>' +
    (r.eligible && r.due > 0 ? '<button class="btn btn-green" onclick="markPayout(\'' + r.refUid + '\',' + r.earned + ')">💸 Mark ₹' + r.due + ' Paid</button>' : '') +
    '</div>'
  ).join('');
}

/* ══ ACTIONS ══ */
async function approveUser(id) {
  await db.collection('users').doc(id).update({ 'profile.status': 'approved', 'profile.rejectReason': '', 'profile.approvedAt': firebase.firestore.FieldValue.serverTimestamp() });
  await loadAll(); render();
}
async function rejectUser(id) {
  const reason = prompt('Reject reason (user ko dikhega):') || '';
  await db.collection('users').doc(id).update({ 'profile.status': 'rejected', 'profile.rejectReason': reason });
  await loadAll(); render();
}
async function suspendUser(id) {
  const reason = prompt('Suspend reason:') || 'Suspended by admin';
  await db.collection('users').doc(id).update({ 'profile.status': 'rejected', 'profile.rejectReason': reason });
  await loadAll(); render();
}
async function setPlan(id) {
  const sel = document.getElementById('plan-' + id); if (!sel) return;
  if (sel.value === 'free') {
    await db.collection('users').doc(id).update({ 'profile.plan': 'free', 'profile.planId': '', 'profile.planExpiry': '' });
  } else {
    const pl = PLANS.find(p => p.id === sel.value); if (!pl) return;
    const exp = new Date(Date.now() + (pl.days || 30) * 86400000).toISOString().slice(0, 10);
    await db.collection('users').doc(id).update({ 'profile.plan': pl.name, 'profile.planId': pl.id, 'profile.planExpiry': exp });
  }
  await loadAll(); render();
}
async function savePlan() {
  const id = document.getElementById('pl-id').value;
  const name = document.getElementById('pl-name').value.trim();
  const price = parseFloat(document.getElementById('pl-price').value) || 0;
  const days = parseInt(document.getElementById('pl-days').value) || 30;
  const features = document.getElementById('pl-feat').value.trim();
  if (!name) { alert('Plan name dalo.'); return; }
  if (id) await db.collection('plans').doc(id).set({ name, price, days, features });
  else await db.collection('plans').add({ name, price, days, features });
  document.getElementById('pl-id').value = '';
  await loadAll(); render();
}
function editPlan(id) {
  const p = PLANS.find(x => x.id === id); if (!p) return;
  document.getElementById('pl-id').value = id;
  document.getElementById('pl-name').value = p.name || '';
  document.getElementById('pl-price').value = p.price || '';
  document.getElementById('pl-days').value = p.days || '';
  document.getElementById('pl-feat').value = p.features || '';
}
async function deletePlan(id) {
  if (!confirm('Plan delete karein?')) return;
  await db.collection('plans').doc(id).delete();
  await loadAll(); render();
}
async function saveFreeLimits() {
  const mocks = parseInt(document.getElementById('free-mocks').value) || 5;
  const mediaSaves = parseInt(document.getElementById('free-media').value) || 2;
  const notes = parseInt(document.getElementById('free-notes').value) || 10;
  await db.collection('config').doc('free').set({ mocks, mediaSaves, notes });
  CONFIG.free = { mocks, mediaSaves, notes };
  showToast('✅ Free limits saved!');
}
async function saveFreeLimits() {
  const mocks = parseInt(document.getElementById('free-mocks').value) || 5;
  const mediaSaves = parseInt(document.getElementById('free-media').value) || 2;
  const notes = parseInt(document.getElementById('free-notes').value) || 10;
  await db.collection('config').doc('free').set({ mocks, mediaSaves, notes });
  CONFIG.free = { mocks, mediaSaves, notes };
  showToast('Free limits saved!');
}
async function saveUpiConfig() {
  const upiId = document.getElementById('cfg-upi').value.trim();
  const payeeName = document.getElementById('cfg-payee').value.trim();
  if (!upiId) { alert('UPI ID dalo.'); return; }
  await db.collection('config').doc('payment').set({ upiId, payeeName });
  await loadAll(); render();
}
async function verifyPayment(id) {
  const p = PAYMENTS.find(x => x.id === id); if (!p) return;
  const pl = PLANS.find(x => x.id === p.planId);
  await db.collection('payments').doc(id).update({ status: 'verified', verifiedAt: firebase.firestore.FieldValue.serverTimestamp() });
  if (p.uid) {
    const exp = new Date(Date.now() + ((pl && pl.days) || 30) * 86400000).toISOString().slice(0, 10);
    await db.collection('users').doc(p.uid).update({ 'profile.plan': (pl && pl.name) || p.planName || 'Pro', 'profile.planId': p.planId || '', 'profile.planExpiry': exp });
  }
  await loadAll(); render();
}
async function declinePayment(id) {
  await db.collection('payments').doc(id).update({ status: 'declined' });
  await loadAll(); render();
}
async function markPayout(refUid, totalEarned) {
  if (!confirm('Payout mark karein as paid? (₹' + totalEarned + ' total)')) return;
  await db.collection('users').doc(refUid).update({ 'profile.payoutPaidAmount': totalEarned, 'profile.payoutLastAt': firebase.firestore.FieldValue.serverTimestamp() });
  await loadAll(); render();
}

/* REQUESTS TAB */
function renderRequests() {
  if (!REQUESTS || !REQUESTS.length) return '<div class="empty">&#128161; Abhi koi user request nahi aayi.</div>';
  var typeLabels = {feature:'New Feature',exam:'Add New Exam',chapter:'Add Chapter/Topic',youtube:'YouTube Resource',bug:'Bug Report',other:'Other'};
  return REQUESTS.map(function(r) {
    var statusBadge = r.status==='new' ? '<span class="badge badge-amber">New</span>' : r.status==='done' ? '<span class="badge badge-green">Done</span>' : '<span class="badge badge-red">Dismissed</span>';
    return '<div class="card" style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;"><div style="flex:1;min-width:220px;"><strong>' + esc(r.name||r.email||r.uid) + '</strong> ' + statusBadge + ' <span class="badge badge-blue">' + esc(typeLabels[r.type]||r.type||'Other') + '</span><div class="muted" style="margin-top:4px;">' + esc(r.email||'') + ' &middot; ' + fmtDate(r.createdAt) + '</div><div style="margin-top:6px;font-size:0.85rem;background:var(--bg);border-radius:8px;padding:8px 12px;border:1px solid var(--border);">' + esc(r.detail||'') + '</div></div>' +
    (r.status==='new' ? '<div class="row" style="flex-shrink:0;align-items:flex-start;"><button class="btn btn-green" onclick="markRequest(\'' + r.id + '\',\'done\')">&#10003; Mark Done</button><button class="btn btn-red" onclick="markRequest(\'' + r.id + '\',\'dismissed\')">Dismiss</button></div>' : '') +
    '</div></div>';
  }).join('');
}

/* SETTINGS TAB */
function renderSettings() {
  var forceOn = (SETTINGS && SETTINGS.requireApproval === true);
  return '<div class="card" style="margin-bottom:1rem;">' +
    '<h3 style="margin-bottom:0.5rem;">&#128273; Same-Device Detection (Always Active)</h3>' +
    '<p class="muted" style="line-height:1.65;font-size:0.85rem;margin-bottom:0.5rem;">This is the <strong>default rule</strong> and cannot be disabled:<br>' +
    '&#10004; <strong>First account</strong> from a device &rarr; <span style="color:var(--accent);font-weight:700;">Instantly approved</span><br>' +
    '&#9203; <strong>Second (or more) account</strong> from the same device &rarr; <span style="color:var(--amber);font-weight:700;">Goes to Pending</span> for your review<br>' +
    'In the Pending tab, same-device accounts show a <strong>&#128273; Same Device</strong> badge so you can spot them instantly.</p>' +
    '</div>' +
    '<div class="card">' +
    '<h3 style="margin-bottom:0.5rem;">&#128272; Force Approval for ALL New Registrations</h3>' +
    '<p class="muted" style="font-size:0.85rem;line-height:1.65;margin-bottom:1rem;">When <strong>ON</strong>: every new registration waits for approval regardless of device — even first-time devices.<br>' +
    'When <strong>OFF</strong> (default): only same-device duplicates go to Pending.</p>' +
    '<div class="row" style="align-items:center;gap:14px;margin-bottom:0.75rem;flex-wrap:wrap;">' +
    '<span style="font-weight:700;">Force Approval for All New Accounts</span>' +
    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;">' +
    '<input type="checkbox" id="cfg-require-approval"' + (forceOn ? ' checked' : '') + ' style="width:20px;height:20px;accent-color:var(--accent);cursor:pointer;" onchange="document.getElementById(\'approval-lbl\').textContent=this.checked?\'ON\':\'OFF\';document.getElementById(\'approval-lbl\').style.color=this.checked?\'var(--accent-dark)\':\'var(--muted)\';">' +
    '<span id="approval-lbl" style="font-weight:800;font-size:1rem;color:' + (forceOn ? 'var(--accent-dark)' : 'var(--muted)') + ';">' + (forceOn ? 'ON' : 'OFF') + '</span>' +
    '</label>' +
    '<button class="btn btn-green" onclick="saveApprovalSetting()">Save</button>' +
    '</div>' +
    '<div class="muted" style="font-size:0.78rem;">Existing pending accounts are not affected by changes here.</div>' +
    '</div>';
}

async function saveApprovalSetting() {
  var cb = document.getElementById('cfg-require-approval');
  var isOn = cb ? cb.checked : false;
  try {
    await db.collection('config').doc('settings').set({ requireApproval: isOn }, { merge: true });
    SETTINGS = SETTINGS || {}; SETTINGS.requireApproval = isOn;
    showToast(isOn ? 'Approval required ON — new accounts will be pending.' : 'Instant activation ON — new accounts auto-approved.');
  } catch(e) { showToast('Save failed: ' + e.message); }
}

async function markRequest(id, status) {
  try { await db.collection('requests').doc(id).update({ status: status }); await loadAll(); render(); } catch(e) { showToast('Error: ' + e.message); }
}

/* ── Theme toggle — persisted across landing / app / admin via ez_theme ── */
(function() {
  const st = document.createElement('style');
  st.textContent = `
  html[data-theme="dark"] { --bg:#0A0D12; --card:#161B26; --border:#1E2535; --text:#E8EDF5; --muted:#8B93A5; }
  html[data-theme="dark"] body { background:var(--bg); color:var(--text); }
  html[data-theme="dark"] .topbar,
  html[data-theme="dark"] .tabs { background:#111620; }
  html[data-theme="dark"] .stat,
  html[data-theme="dark"] .login-card { background:#161B26; border-color:#1E2535; }
  html[data-theme="dark"] input,
  html[data-theme="dark"] select { background:#111620; color:var(--text); border-color:#1E2535; }
  html[data-theme="dark"] .btn-gray { background:#1E2535; color:#E8EDF5; }`;
  document.head.appendChild(st);

  function apply(t) {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('ez_theme', t); } catch(e) {}
    const b = document.getElementById('ez-theme-btn');
    if (b) b.textContent = t === 'light' ? '🌙' : '☀️';
  }
  const row = document.querySelector('#panel .topbar .row');
  if (row) {
    const b = document.createElement('button');
    b.id = 'ez-theme-btn';
    b.className = 'btn btn-gray';
    b.onclick = function() { apply(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light'); };
    row.insertBefore(b, row.firstChild);
  }
  let t = 'light';
  try { t = localStorage.getItem('ez_theme') || 'light'; } catch(e) {}
  apply(t);
})();
</script>
