<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyPlanner — Admin Panel</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/admin.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>🔐 StudyPlanner Admin</h2>
    <input type="email" id="adm-email" placeholder="Admin email">
    <input type="password" id="adm-pass" placeholder="Password">
    <div class="err" id="adm-err"></div>
    <button class="btn btn-green" style="width:100%;padding:11px;" onclick="adminLoginEmail()">Sign In</button>
    <button class="btn btn-gray" style="width:100%;padding:11px;margin-top:8px;" onclick="adminLoginGoogle()">Continue with Google</button>
    <p class="muted" style="margin-top:12px;text-align:center;">Sirf admin account se access milega.</p>
  </div>
</div>

<div id="panel">
  <div class="topbar">
    <div class="logo">Study<span>Planner</span> · Admin</div>
    <div class="row">
      <span class="muted" id="admin-email"></span>
      <button class="btn btn-gray" onclick="loadAll().then(render)">↻ Refresh</button>
      <button class="btn btn-red" onclick="firebase.auth().signOut().then(()=>{_unsubs.forEach(u=>{try{u();}catch(e){}});location.reload();})">Logout</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab" data-t="analytics" onclick="setTab('analytics')">📊 Analytics</div>
    <div class="tab active" data-t="pending" onclick="setTab('pending')">⏳ Pending <span id="cnt-pending"></span></div>
    <div class="tab" data-t="telegram" onclick="setTab('telegram')">✈️ Telegram <span id="cnt-tg"></span></div>
    <div class="tab" data-t="users" onclick="setTab('users')">👥 Users</div>
    <div class="tab" data-t="plans" onclick="setTab('plans')">💰 Plans</div>
    <div class="tab" data-t="payments" onclick="setTab('payments')">🧾 Payments</div>
    <div class="tab" data-t="referrals" onclick="setTab('referrals')">🔗 Referrals</div>
    <div class="tab" data-t="payouts" onclick="setTab('payouts')">💸 Payouts</div>
    <div class="tab" data-t="coupons" onclick="setTab('coupons')">🎟️ Coupons</div>
    <div class="tab" data-t="requests" onclick="setTab('requests')">&#x1f4a1; Requests <span id="cnt-requests"></span></div>
    <div class="tab" data-t="settings" onclick="setTab('settings')">&#x2699; Settings</div>
  </div>
  <div class="wrap">
    <div class="stat-row" id="stats"></div>
    <div id="content"></div>
  </div>
</div>

<script src="js/core/firebase-config.js"></script>
<script type="module" src="src/main.js"></script>
<script src="js/admin/admin-core.js"></script>
<script src="js/admin/admin-render.js"></script>
<script src="js/admin/admin-actions.js"></script>
</body>
</html>
